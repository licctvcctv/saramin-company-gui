name: Build Saramin GUI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build exe
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --name saramin_company_gui
          --add-data "saramin_app;saramin_app"
          launcher.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saramin-company-gui-windows
          path: dist\saramin_company_gui.exe
